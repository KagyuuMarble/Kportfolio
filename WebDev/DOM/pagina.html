<!DOCTYPE HTML>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="styles.css">
    </head>
    <body>
        <div class="scrolling-container">
            <div class="scrolling-text">ネ土会ェ貝南犬☆カゞんIよ″るノDA!!｡
            </div>
        </div>
        <div class="video-container">
            <video id="myVideo" src="shakaikouken.mp4" poster="msgkzundamon.jpg"></video>
            
            <div class="controls">
                <button id="playPauseBtn" class="control-btn">▶</button>
                <input type="range" id="progressBar" class="progress" min="0" max="100" value="0">
                <span id="timeDisplay">00:00 / 00:00</span>
                <button id="muteBtn" class="control-btn">🔊</button>
                <input type="range" id="volumeControl" class="volume" min="0" max="1" step="0.1" value="1">
                <button id="fullscreenBtn" class="control-btn">⛶</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
